port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info

# ================= 节点 =================

proxy-providers:
substore:
type: http
url: "http://192.168.1.100:3001/api/download/collection/3sub?target=ClashMeta"
interval: 3600

# ================= 分组 =================

proxy-groups:

* name: 🚀 节点选择
  type: select
  use:

  * substore
    proxies:
  * DIRECT

* name: 🌍 国外媒体
  type: select
  proxies:

  * 🚀 节点选择
  * 🎯 全球直连

* name: 📲 电报信息
  type: select
  proxies:

  * 🚀 节点选择
  * 🎯 全球直连

* name: 🎯 全球直连
  type: select
  proxies:

  * DIRECT
  * 🚀 节点选择

* name: 🛑 全球拦截
  type: select
  proxies:

  * REJECT
  * DIRECT

* name: 🍃 应用净化
  type: select
  proxies:

  * REJECT
  * DIRECT

* name: 🐟 漏网之鱼
  type: select
  proxies:

  * 🚀 节点选择
  * 🎯 全球直连

