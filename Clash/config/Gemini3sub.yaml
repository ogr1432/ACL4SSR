# ==========================================
# 基础通用配置 - 强制对齐订阅转换标准
# ==========================================
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: :9090
unified-delay: true

# ==========================================
# DNS 核心修正：触发 Fake-IP 模式的关键
# ==========================================
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # 必须配置 default-nameserver 以便解析 Rule Provider 的域名
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - 'localhost.ptlogin2.qq.com'

# ==========================================
# 1. 节点来源
# ==========================================
proxy-providers:
  sub_store_nodes:
    type: http
    url: "http://192.168.1.100:3001/api/download/collection/3sub?target=clashmeta"
    interval: 3600
    path: ./proxies/sub_store.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# ==========================================
# 2. 策略组
# ==========================================
proxy-groups:
  - name: "🚀 节点选择"
    type: select
    use: [sub_store_nodes]
    proxies: [DIRECT]

  - name: "🌍 国外媒体"
    type: select
    use: [sub_store_nodes]
    proxies: ["🚀 节点选择", "🎯 全球直连"]

  - name: "📲 电报信息"
    type: select
    use: [sub_store_nodes]
    proxies: ["🚀 节点选择", "🎯 全球直连"]

  - name: "🌍 审计资讯"
    type: select
    use: [sub_store_nodes]
    proxies: ["🚀 节点选择", "🎯 全球直连"]

  - name: "🎯 全球直连"
    type: select
    use: [sub_store_nodes]
    proxies: [DIRECT, "🚀 节点选择"]

  - name: "🛑 全球拦截"
    type: select
    proxies: [REJECT, DIRECT]

  - name: "🍃 应用净化"
    type: select
    proxies: [REJECT, DIRECT]

  - name: "🐟 漏网之鱼"
    type: select
    use: [sub_store_nodes]
    proxies: ["🚀 节点选择", "🎯 全球直连"]

