# ==========================================
# 4. 规则匹配 (完整 18 条规则映射)
# ==========================================
rules:
  # 拦截与端口规则
  - IP-CIDR,198.18.0.1/16,REJECT,no-resolve
  - DST-PORT,7895,REJECT
  - DST-PORT,7892,REJECT

  # 规则集匹配逻辑（按优先级排列）
  - "RULE-SET,lan,🎯 全球直连"
  - "RULE-SET,ban_ad,🛑 全球拦截"
  - "RULE-SET,ban_program,🍃 应用净化"
  - "RULE-SET,google_cn,🎯 全球直连"
  - "RULE-SET,steam_cn,🎯 全球直连"
  - "RULE-SET,telegram,📲 电报信息"
  - "RULE-SET,proxy_media,🌍 国外媒体"
  - "RULE-SET,bloomberg,🌍 审计资讯"
  - "RULE-SET,proxy_lite,🚀 节点选择"
  - "RULE-SET,google_fcm,🚀 节点选择"
  - "RULE-SET,openai,🚀 节点选择"
  - "RULE-SET,apple,🎯 全球直连"
  - "RULE-SET,microsoft,🎯 全球直连"
  - "RULE-SET,china_domain,🎯 全球直连"
