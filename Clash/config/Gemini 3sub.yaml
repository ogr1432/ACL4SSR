# ==========================================
# 基础配置
# ==========================================
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: error # 改为 error 减少日志压力
external-controller: :9090

# ==========================================
# 1. 核心：定义节点来源（Sub-Store）
# ==========================================
proxy-providers:
  sub_store_nodes:
    type: http
    url: "http://192.168.1.100:3001/api/download/collection/3sub?target=clashmeta"
    interval: 3600
    path: ./proxies/sub_store.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# ==========================================
# 2. 策略组逻辑（图标与下方 rules 严格一致）
# ==========================================
proxy-groups:
  - name: 🚀 节点选择
    type: select
    use: [sub_store_nodes]
    proxies: [DIRECT]

  - name: 🌍 国外媒体
    type: select
    use: [sub_store_nodes]
    proxies: [🚀 节点选择, 🎯 全球直连]

  - name: 📲 电报信息
    type: select
    use: [sub_store_nodes]
    proxies: [🚀 节点选择, 🎯 全球直连]

  - name: 🌍 审计资讯
    type: select
    use: [sub_store_nodes]
    proxies: [🚀 节点选择, 🎯 全球直连]

  - name: 🎯 全球直连
    type: select
    use: [sub_store_nodes]
    proxies: [DIRECT, 🚀 节点选择]

  - name: 🛑 全球拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: 🍃 应用净化
    type: select
    proxies: [REJECT, DIRECT]

  - name: 🐟 漏网之鱼
    type: select
    use: [sub_store_nodes]
    proxies: [🚀 节点选择, 🎯 全球直连]

# ==========================================
# 3. 规则集定义（Rule Providers）
# ==========================================
rule-providers:
  lan:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/LocalAreaNetwork.list"
    path: ./rule_provider/lan.yaml
  ban_ad:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/BanAD.list"
    path: ./rule_provider/ban_ad.yaml
  ban_program:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/BanProgramAD.list"
    path: ./rule_provider/ban_program.yaml
  google_cn:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/GoogleCN.list"
    path: ./rule_provider/google_cn.yaml
  telegram:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/Telegram.list"
    path: ./rule_provider/telegram.yaml
  proxy_media:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/ProxyMedia.list"
    path: ./rule_provider/proxy_media.yaml
  bloomberg:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/Bloomberg"
    path: ./rule_provider/bloomberg.yaml
  proxy_lite:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/ProxyLite.list"
    path: ./rule_provider/proxy_lite.yaml
  openai:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/refs/heads/master/Clash/Ruleset/OpenAi.list"
    path: ./rule_provider/openai.yaml
  china_domain:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/ChinaDomain.list"
    path: ./rule_provider/china_domain.yaml
  nas:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/NAS.list"
    path: ./rule_provider/nas.yaml
  banks_hk:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/refs/heads/master/Clash/BanksHongKong.list"
    path: ./rule_provider/banks_hk.yaml

# ==========================================
# 4. 规则匹配（已手动对齐图标，确保匹配生效）
# ==========================================
rules:
  # 强制拦截特定端口和 IP
  - DST-PORT,7895,REJECT
  - DST-PORT,7892,REJECT
  - IP-CIDR,198.18.0.1/16,REJECT,no-resolve
  
  # 规则集匹配
  - RULE-SET,lan,🎯 全球直连
  - RULE-SET,ban_ad,🛑 全球拦截
  - RULE-SET,ban_program,🍃 应用净化
  - RULE-SET,google_cn,🎯 全球直连
  - RULE-SET,telegram,📲 电报信息
  - RULE-SET,proxy_media,🌍 国外媒体
  - RULE-SET,bloomberg,🌍 审计资讯
  - RULE-SET,proxy_lite,🚀 节点选择
  - RULE-SET,openai,🚀 节点选择
  - RULE-SET,china_domain,🎯 全球直连
  - RULE-SET,nas,🎯 全球直连
  - RULE-SET,banks_hk,🎯 全球直连
  
  # 兜底规则
  - GEOIP,CN,🎯 全球直连
  - MATCH,🐟 漏网之鱼
