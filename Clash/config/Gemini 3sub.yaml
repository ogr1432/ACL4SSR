# Sub-Store 脚本会自动填充 proxies 列表
proxies: []

# 策略组：对应你 .ini 中的 custom_proxy_group
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - DIRECT
  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT
  - name: 📲 电报信息
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT
  - name: 🌍 审计资讯
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
  - name: 🛑 全球拦截
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 🍃 应用净化
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT

# 规则集：对应你 .ini 中的 ruleset，改为 rule-providers 模式
rule-providers:
  LocalAreaNetwork:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/LocalAreaNetwork.list"
    path: ./ruleset/lan.yaml
    interval: 86400
  BanAD:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/BanAD.list"
    path: ./ruleset/banad.yaml
    interval: 86400
  BanProgramAD:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/BanProgramAD.list"
    path: ./ruleset/banprog.yaml
    interval: 86400
  GoogleCN:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/GoogleCN.list"
    path: ./ruleset/googlecn.yaml
    interval: 86400
  Telegram:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/Telegram.list"
    path: ./ruleset/tg.yaml
    interval: 86400
  ProxyMedia:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/ProxyMedia.list"
    path: ./ruleset/media.yaml
    interval: 86400
  # ... 其他 list 依此类推 ...
  ChinaIP:
    type: http
    behavior: ipset
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/ChinaCompanyIp.list"
    path: ./ruleset/chinaip.yaml
    interval: 86400

# 规则逻辑：对应 .ini 的分流顺序
rules:
  - RULE-SET,LocalAreaNetwork,🎯 全球直连
  - RULE-SET,BanAD,🛑 全球拦截
  - RULE-SET,BanProgramAD,🍃 应用净化
  - RULE-SET,GoogleCN,🎯 全球直连
  - RULE-SET,Telegram,📲 电报信息
  - RULE-SET,ProxyMedia,🌍 国外媒体
  - GEOIP,CN,🎯 全球直连
  - MATCH,🐟 漏网之鱼
