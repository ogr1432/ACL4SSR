# ==========================================
# 基础配置
# ==========================================
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: error
external-controller: :9090

# ==========================================
# 1. 核心：定义节点来源（Sub-Store）
# ==========================================
proxy-providers:
  sub_store_nodes:
    type: http
    # 确保你的手机在更新时能访问到这个局域网 IP
    url: "http://192.168.1.100:3001/api/download/collection/3sub?target=clashmeta"
    interval: 43200
    path: ./proxies/sub_store.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# ==========================================
# 2. 策略组逻辑（图标与下方 rules 严格对齐）
# ==========================================
proxy-groups:
  - name: "🚀 节点选择"
    type: select
    use:
      - sub_store_nodes
    proxies:
      - DIRECT

  - name: "🌍 国外媒体"
    type: select
    use:
      - sub_store_nodes
    proxies:
      - "🚀 节点选择"
      - "🎯 全球直连"

  - name: "📲 电报信息"
    type: select
    use:
      - sub_store_nodes
    proxies:
      - "🚀 节点选择"
      - "🎯 全球直连"

  - name: "🌍 审计资讯"
    type: select
    use:
      - sub_store_nodes
    proxies:
      - "🚀 节点选择"
      - "🎯 全球直连"

  - name: "🎯 全球直连"
    type: select
    use:
      - sub_store_nodes
    proxies:
      - DIRECT
      - "🚀 节点选择"

  - name: "🛑 全球拦截"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "🍃 应用净化"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "🐟 漏网之鱼"
    type: select
    use:
      - sub_store_nodes
    proxies:
      - "🚀 节点选择"
      - "🎯 全球直连"

# ==========================================
# 3. 规则集定义（Rule Providers）
# ==========================================
rule-providers:
  lan:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/LocalAreaNetwork.list"
    path: ./rule_provider/lan.yaml
    interval: 86400
  ban_ad:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/BanAD.list"
    path: ./rule_provider/ban_ad.yaml
    interval: 86400
  ban_program:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/BanProgramAD.list"
    path: ./rule_provider/ban_program.yaml
    interval: 86400
  google_cn:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/GoogleCN.list"
    path: ./rule_provider/google_cn.yaml
    interval: 86400
  steam_cn:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/Ruleset/SteamCN.list"
    path: ./rule_provider/steam_cn.yaml
    interval: 86400
  telegram:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/Telegram.list"
    path: ./rule_provider/telegram.yaml
    interval: 86400
  proxy_media:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ogr1432/ACL4SSR/master/Clash/ProxyMedia.list"
    path: ./rule_provider/proxy_media.yaml
    interval: 86400
  bloomberg:
    type: http
    behavior: classical
    url: "
