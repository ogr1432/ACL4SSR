# 基础配置
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: :9090

# 核心：定义节点来源（Sub-Store）
proxy-providers:
  sub_store_nodes:
    type: http
    # 替换为你的 Sub-Store 3合1 订阅地址，务必保留 &target=clash
    url: "http://192.168.1.100:3001/api/download/collection/3sub?target=clash"
    interval: 3600
    path: ./proxies/sub_store.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300     

# 策略组逻辑（完全对应你的 .ini custom_proxy_group）
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies: [DIRECT]
  - name: 🌍 国外媒体
    type: select
    proxies: [🚀 节点选择, 🎯 全球直连]
  - name: 📲 电报信息
    type: select
    proxies: [🚀 节点选择, 🎯 全球直连]
  - name: 🌍 审计资讯
    type: select
    proxies: [🚀 节点选择, 🎯 全球直连]
  - name: 🎯 全球直连
    type: select
    proxies: [DIRECT, 🚀 节点选择]
  - name: 🛑 全球拦截
    type: select
    proxies: [REJECT, DIRECT]
  - name: 🍃 应用净化
    type: select
    proxies: [REJECT, DIRECT]
  - name: 🐟 漏网之鱼
    type: select
    proxies: [🚀 节点选择, 🎯 全球直连]

